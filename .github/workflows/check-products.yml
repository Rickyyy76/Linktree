name: Check Product Availability

on:
  schedule:
    # Jeden Montag um 6 Uhr morgens (UTC)
    - cron: '0 6 * * 1'
  workflow_dispatch: # Erlaubt manuellen Trigger im GitHub UI

jobs:
  check-products:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Check products
        run: python check_products.py
      
      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if ! git diff --staged --quiet; then
            git commit -m "🤖 Auto: Entferne nicht verfügbare Produkte"
            git push
          else
            echo "✓ Alle Produkte verfügbar, nichts zu tun"
          fi
